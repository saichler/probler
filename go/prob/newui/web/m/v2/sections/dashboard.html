</style>

<script>
function initMobileDashboard() {
    loadDashboardStats();
    Layer8MNav.showHome();
}

async function loadDashboardStats(idPrefix) {
    var prefix = idPrefix || '';
    const kpis = [
        { id: prefix + 'stat-devices', endpoint: '/0/NCache', query: 'select * from NetworkDevice limit 1 page 0' },
        { id: prefix + 'stat-gpus', endpoint: '/0/NCache', query: 'select * from GpuDevice limit 1 page 0' },
        { id: prefix + 'stat-hosts', endpoint: '/0/NCache', query: 'select * from Hypervisor limit 1 page 0' },
        { id: prefix + 'stat-k8s', endpoint: '/0/NCache', query: 'select * from K8sPod limit 1 page 0' },
        { id: prefix + 'stat-alarms', endpoint: '/20/Alarm', query: 'select * from Alarm limit 1 page 0' },
        { id: prefix + 'stat-critical', endpoint: '/20/Alarm', query: 'select * from Alarm where severity=4 limit 1 page 0' }
    ];
    await Promise.all(kpis.map(kpi => loadKPI(kpi)));
}

async function loadKPI(kpi) {
    try {
        const body = encodeURIComponent(JSON.stringify({ text: kpi.query }));
        const response = await Layer8MAuth.get(Layer8MConfig.resolveEndpoint(kpi.endpoint) + '?body=' + body);
        const element = document.getElementById(kpi.id);
        if (element) {
            if (response && response.metadata?.keyCount?.counts) {
                element.textContent = response.metadata.keyCount.counts.Total || 0;
            } else {
                element.textContent = '0';
            }
        }
    } catch (error) {
        const element = document.getElementById(kpi.id);
        if (element) element.textContent = '0';
    }
}
</script>
