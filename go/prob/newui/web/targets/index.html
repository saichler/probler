<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Targets Management</title>
    <link rel="stylesheet" href="../l8ui/shared/layer8d-theme-tokens.css">
    <link rel="stylesheet" href="../l8ui/shared/layer8d-theme.css">
    <link rel="stylesheet" href="../l8ui/edit_table/layer8d-table.css">
    <link rel="stylesheet" href="targets.css">
    <script>
        (function() {
            function applyTheme(theme) {
                if (theme) {
                    document.documentElement.setAttribute('data-theme', theme);
                } else {
                    document.documentElement.removeAttribute('data-theme');
                }
            }
            try {
                var parentTheme = window.parent.document.documentElement.getAttribute('data-theme');
                applyTheme(parentTheme);
            } catch (e) { /* cross-origin safety net */ }
            window.addEventListener('message', function(event) {
                if (event.data && event.data.type === 'probler-theme-change') {
                    applyTheme(event.data.theme);
                }
            });
        })();
    </script>
</head>
<body>
    <div class="container">
        <section id="targets" class="content-section">
            <div class="filter-bar">
                <div class="filter-group">
                    <label for="inventory-type-filter">Inventory Type:</label>
                    <select id="inventory-type-filter" onchange="onInventoryTypeChange(this.value)">
                        <!-- Options populated by JS -->
                    </select>
                </div>
                <div class="l8-bulk-actions">
                    <button id="start-all-btn" class="btn btn-success btn-small" title="Start all targets of this type">
                        Start All
                    </button>
                    <button id="stop-all-btn" class="btn btn-danger btn-small" title="Stop all targets of this type">
                        Stop All
                    </button>
                </div>
            </div>
            <div id="targets-table-container"></div>
        </section>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <script src="config.js"></script>
    <script src="../l8ui/shared/layer8d-config.js"></script>
    <script src="../l8ui/shared/layer8d-utils.js"></script>
    <script src="../l8ui/shared/layer8-csv-export.js"></script>
    <script src="../l8ui/edit_table/layer8d-table-core.js"></script>
    <script src="../l8ui/edit_table/layer8d-table-data.js"></script>
    <script src="../l8ui/edit_table/layer8d-table-render.js"></script>
    <script src="../l8ui/edit_table/layer8d-table-events.js"></script>
    <script src="../l8ui/edit_table/layer8d-table-filter.js"></script>
    <script src="../l8ui/edit_table/layer8d-table.js"></script>
    <script src="targets.js"></script>
    <script src="targets-detail.js"></script>
    <script src="targets-hosts.js"></script>
</body>
</html>
