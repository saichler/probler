syntax = "proto3";

package types;

option java_multiple_files = true;
option java_outer_classname = "Types";
option java_package = "com.k8s.types";
option go_package = "./types";
import "api.proto";

// vCluster (SA 17)
message K8SVCluster {
  string namespace = 1;
  string name = 2;
  string status = 3;
  string k8s_version = 4;
  string distro = 5;
  string connected = 6;
  int32 synced_pods = 7;
  int32 synced_services = 8;
  int32 synced_ingresses = 9;
  string age = 10;
  string cluster_name = 100;
  string key = 101;
}
message K8SVClusterList {
  repeated K8SVCluster list = 1;
  l8api.L8MetaData metadata = 2;
}
