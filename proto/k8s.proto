syntax = "proto3";

package types;

option java_multiple_files = true;
option java_outer_classname = "Types";
option java_package = "com.k8s.types";
option go_package = "./types";
import "api.proto";

message K8sReadyState {
  int32 count = 1;
  int32 outof = 2;
}

message K8sRestartsState {
  int32 count = 1;
  string ago = 2;
}

enum K8SPodStatus {
  K8S_POD_STATUS_UNSPECIFIED = 0;
  K8S_POD_STATUS_RUNNING = 1;
  K8S_POD_STATUS_PENDING = 2;
  K8S_POD_STATUS_SUCCEEDED = 3;
  K8S_POD_STATUS_FAILED = 4;
  K8S_POD_STATUS_UNKNOWN = 5;
  K8S_POD_STATUS_CRASHLOOPBACKOFF = 6;
  K8S_POD_STATUS_TERMINATING = 7;
  K8S_POD_STATUS_CONTAINERCREATING = 8;
  K8S_POD_STATUS_IMAGEPULLBACKOFF = 9;
  K8S_POD_STATUS_ERROR = 10;
  K8S_POD_STATUS_COMPLETED = 11;
}

enum K8SNodeStatus {
  K8S_NODE_STATUS_UNSPECIFIED = 0;
  K8S_NODE_STATUS_READY = 1;
  K8S_NODE_STATUS_NOT_READY = 2;
}

enum K8SJobCondition {
  K8S_JOB_CONDITION_UNSPECIFIED = 0;
  K8S_JOB_CONDITION_COMPLETE = 1;
  K8S_JOB_CONDITION_FAILED = 2;
  K8S_JOB_CONDITION_SUSPENDED = 3;
}

// Cluster summary
message K8SCluster {
  string name = 1;
  K8SClusterSummary summary = 2;
  string k8s_version = 3;
  string platform = 4;
}
message K8SClusterList {
  repeated K8SCluster list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SClusterSummary {
  int32 total_nodes = 1;
  int32 ready_nodes = 2;
  int32 total_pods = 3;
  int32 running_pods = 4;
  int32 failed_pods = 5;
  int32 pending_pods = 6;
  int32 total_deployments = 7;
  int32 available_deployments = 8;
  int32 total_services = 9;
  int32 total_namespaces = 10;
  int32 total_pvcs = 11;
  int32 bound_pvcs = 12;
  int32 total_ingresses = 13;
  int32 total_jobs = 14;
  int32 active_jobs = 15;
  bool istio_installed = 16;
  string istio_version = 17;
  int32 total_vclusters = 18;
  int32 total_crds = 19;

  // Workloads (additional)
  int32 total_statefulsets = 20;
  int32 ready_statefulsets = 21;
  int32 total_daemonsets = 22;
  int32 ready_daemonsets = 23;
  int32 total_replicasets = 24;
  int32 total_cronjobs = 25;
  int32 active_cronjobs = 26;
  int32 total_hpas = 27;

  // Networking (additional)
  int32 total_networkpolicies = 28;
  int32 total_endpoints = 29;
  int32 total_endpointslices = 30;
  int32 total_ingressclasses = 31;

  // Storage (additional)
  int32 total_persistentvolumes = 32;
  int32 bound_persistentvolumes = 33;
  int32 total_storageclasses = 34;

  // Configuration
  int32 total_configmaps = 35;
  int32 total_secrets = 36;
  int32 total_resourcequotas = 37;
  int32 total_limitranges = 38;
  int32 total_poddisruptionbudgets = 39;

  // Access Control
  int32 total_serviceaccounts = 40;
  int32 total_roles = 41;
  int32 total_clusterroles = 42;
  int32 total_rolebindings = 43;
  int32 total_clusterrolebindings = 44;

  // Istio per-resource counts (istio_installed=16 preserved above)
  int32 total_istio_virtualservices = 45;
  int32 total_istio_destinationrules = 46;
  int32 total_istio_gateways = 47;
  int32 total_istio_serviceentries = 48;
  int32 total_istio_peerauthentications = 49;
  int32 total_istio_authorizationpolicies = 50;
  int32 total_istio_sidecars = 51;
  int32 total_istio_envoyfilters = 52;

  // Events
  int32 total_events = 53;
  int32 warning_events = 54;
}

// Workloads (SA 10)
message K8SPod {
  string namespace = 1;
  string name = 2;
  K8sReadyState ready = 3;
  K8SPodStatus status = 4;
  K8sRestartsState restarts = 5;
  string age = 6;
  string ip = 7;
  string node = 8;
  string nominated_node = 9;
  string readiness_gates = 10;
  // JSON-encoded array of container specs populated by the collector's
  // enrichPod from spec.containers / spec.initContainers / status.containerStatuses.
  // The UI parses this string in the pod detail popup to render per-container
  // image, imagePullPolicy, ports, env, resources, volumeMounts, ready, state,
  // and restartCount. Empty when the pod has no containers (or the field
  // hasn't been populated by an older collector version).
  string containers_json = 11;
  string cluster_name = 100;
  string key = 101;
}
message K8SPodList {
  repeated K8SPod list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SDeployment {
  string namespace = 1;
  string name = 2;
  string ready = 3;
  string up_to_date = 4;
  string available = 5;
  string age = 6;
  string containers = 7;
  string images = 8;
  string selector = 9;
  string cluster_name = 100;
  string key = 101;
}
message K8SDeploymentList {
  repeated K8SDeployment list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SStatefulSet {
  string namespace = 1;
  string name = 2;
  string ready = 3;
  string age = 4;
  string containers = 5;
  string images = 6;
  string cluster_name = 100;
  string key = 101;
}
message K8SStatefulSetList {
  repeated K8SStatefulSet list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SDaemonSet {
  string namespace = 1;
  string name = 2;
  string desired = 3;
  string current = 4;
  string ready = 5;
  string up_to_date = 6;
  string available = 7;
  string node_selector = 8;
  string age = 9;
  string containers = 10;
  string images = 11;
  string selector = 12;
  string cluster_name = 100;
  string key = 101;
}
message K8SDaemonSetList {
  repeated K8SDaemonSet list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SReplicaSet {
  string namespace = 1;
  string name = 2;
  string desired = 3;
  string current = 4;
  string ready = 5;
  string age = 6;
  string cluster_name = 100;
  string key = 101;
}
message K8SReplicaSetList {
  repeated K8SReplicaSet list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SJob {
  string namespace = 1;
  string name = 2;
  string completions = 3;
  string duration = 4;
  string age = 5;
  K8SJobCondition condition = 6;
  string cluster_name = 100;
  string key = 101;
}
message K8SJobList {
  repeated K8SJob list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SCronJob {
  string namespace = 1;
  string name = 2;
  string schedule = 3;
  string last_schedule = 4;
  bool suspend = 5;
  int32 active = 6;
  string age = 7;
  string cluster_name = 100;
  string key = 101;
}
message K8SCronJobList {
  repeated K8SCronJob list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SHPA {
  string namespace = 1;
  string name = 2;
  string reference = 3;
  string targets = 4;
  int32 min_replicas = 5;
  int32 max_replicas = 6;
  int32 current_replicas = 7;
  string age = 8;
  string cluster_name = 100;
  string key = 101;
}
message K8SHPAList {
  repeated K8SHPA list = 1;
  l8api.L8MetaData metadata = 2;
}

// Networking (SA 11)
message K8SService {
  string namespace = 1;
  string name = 2;
  string type = 3;
  string cluster_ip = 4;
  string external_ip = 5;
  string ports = 6;
  string age = 7;
  string selector = 8;
  string cluster_name = 100;
  string key = 101;
}
message K8SServiceList {
  repeated K8SService list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SIngress {
  string namespace = 1;
  string name = 2;
  string class_name = 3;
  string hosts = 4;
  string address = 5;
  string ports = 6;
  string age = 7;
  string cluster_name = 100;
  string key = 101;
}
message K8SIngressList {
  repeated K8SIngress list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SNetworkPolicy {
  string namespace = 1;
  string name = 2;
  string pod_selector = 3;
  string age = 4;
  string cluster_name = 100;
  string key = 101;
}
message K8SNetworkPolicyList {
  repeated K8SNetworkPolicy list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SEndpoints {
  string namespace = 1;
  string name = 2;
  string endpoints = 3;
  string age = 4;
  string cluster_name = 100;
  string key = 101;
}
message K8SEndpointsList {
  repeated K8SEndpoints list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SEndpointSlice {
  string namespace = 1;
  string name = 2;
  string address_type = 3;
  string ports = 4;
  string endpoints = 5;
  string age = 6;
  string cluster_name = 100;
  string key = 101;
}
message K8SEndpointSliceList {
  repeated K8SEndpointSlice list = 1;
  l8api.L8MetaData metadata = 2;
}
message K8SIngressClass {
  string name = 1;
  string controller = 2;
  string age = 3;
  string cluster_name = 100;
  string key = 101;
}
message K8SIngressClassList {
  repeated K8SIngressClass list = 1;
  l8api.L8MetaData metadata = 2;
}

// Nodes (SA 15)
message K8SNode {
  string name = 1;
  K8SNodeStatus status = 2;
  string roles = 3;
  string age = 4;
  string version = 5;
  string internal_ip = 6;
  string external_ip = 7;
  string os_image = 8;
  string kernel_version = 9;
  string container_runtime = 10;
  string cluster_name = 100;
}
message K8SNodeList {
  repeated K8SNode list = 1;
  l8api.L8MetaData metadata = 2;
}

// Namespaces (SA 16)
message K8SNamespace {
  string name = 1;
  string status = 2;
  string age = 3;
  string cluster_name = 100;
}
message K8SNamespaceList {
  repeated K8SNamespace list = 1;
  l8api.L8MetaData metadata = 2;
}
