apiVersion: v1
kind: Namespace
metadata:
  name: probler
  labels:
    name: probler

---

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: probler-storage
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-standard
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: probler
  name: probler-data
  labels:
    app: probler
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: probler-storage
  resources:
    requests:
      storage: 50Gi

