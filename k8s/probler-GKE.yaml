spec:
  selector:
    matchLabels:
      app: probler-vnet
  template:
    metadata:
      labels:
        app: probler-vnet
    spec:
      hostNetwork: true
      containers:
        - name: probler-vnet
          image: saichler/probler-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - containerPort: 25998
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          persistentVolumeClaim:
            claimName: probler-data

