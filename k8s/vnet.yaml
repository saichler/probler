apiVersion: v1
kind: Namespace
metadata:
  name: probler
  labels:
    name: probler

---

apiVersion: v1
kind: Service
metadata:
  namespace: probler
  name: probler-vnet-headless
  labels:
    app: probler-vnet
spec:
  clusterIP: None
  selector:
    app: probler-vnet
  ports:
    - name: vnet
      port: 25998
      targetPort: 25998

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  namespace: probler
  name: probler-vnet
  labels:
    app: probler-vnet
spec:
  selector:
    matchLabels:
      app: probler-vnet
  template:
    metadata:
      labels:
        app: probler-vnet
    spec:
      hostNetwork: true
      containers:
        - name: probler-vnet
          image: saichler/probler-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - containerPort: 25998
          volumeMounts:
            - name: hdata
              mountPath: /data
      volumes:
        - name: hdata
          hostPath:
            path: /data
            type: DirectoryOrCreate