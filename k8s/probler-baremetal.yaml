# Bare-metal PVC version — requires local-path-provisioner:
#   kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: probler
  labels:
    name: probler

---

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: probler-local-storage
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer

---

# probler-vnet: was DaemonSet, now StatefulSet with anti-affinity for one-per-node
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: probler
  name: probler-vnet
  labels:
    app: probler-vnet
spec:
  serviceName: probler-vnet
  replicas: 3
  selector:
    matchLabels:
      app: probler-vnet
  template:
    metadata:
      labels:
        app: probler-vnet
    spec:
      hostNetwork: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: probler-vnet
              topologyKey: kubernetes.io/hostname
      containers:
        - name: probler-vnet
          image: saichler/probler-vnet:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 25998
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: hdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: probler-local-storage
        resources:
          requests:
            storage: 5Gi

---

